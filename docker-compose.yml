services:
  # ─── Auth DB ───────────────────────────────
  db_auth:
    image: postgres:15
    container_name: db_auth
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── AI DB ─────────────────────────────────
  db_ai:
    image: postgres:15
    container_name: db_ai
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_pass
      POSTGRES_DB: ai_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_ai:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Company DB ─────────────────────────────
  db_company:
    image: pgvector/pgvector:pg15
    container_name: db_company
    environment:
      POSTGRES_USER: company_user
      POSTGRES_PASSWORD: company_pass
      POSTGRES_DB: company_db
    ports:
      - "5436:5432"
    volumes:
      - pgdata_company:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U company_user -d company_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Transcription DB ───────────────────────
  db_transcription:
    image: postgres:15
    container_name: db_transcription
    environment:
      POSTGRES_USER: trans_user
      POSTGRES_PASSWORD: trans_pass
      POSTGRES_DB: transcription_db
    ports:
      - "5437:5432"
    volumes:
      - pgdata_transcription:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trans_user -d transcription_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Meeting DB ─────────────────────────────
  db_meeting:
    image: postgres:15
    container_name: db_meeting
    environment:
      POSTGRES_USER: meeting_user
      POSTGRES_PASSWORD: meeting_pass
      POSTGRES_DB: meeting_db
    ports:
      - "5438:5432"
    volumes:
      - pgdata_meeting:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting_user -d meeting_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── AI Analysis DB ─────────────────────────
  db_ai_analysis:
    image: postgres:15
    container_name: db_ai_analysis
    environment:
      POSTGRES_USER: ai_analysis_user
      POSTGRES_PASSWORD: ai_analysis_pass
      POSTGRES_DB: ai_analysis_db
    ports:
      - "5439:5432"
    volumes:
      - pgdata_ai_analysis:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_analysis_user -d ai_analysis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Integration DB ─────────────────────────
  db_integration:
    image: postgres:15
    container_name: db_integration
    environment:
      POSTGRES_USER: integration_user
      POSTGRES_PASSWORD: integration_pass
      POSTGRES_DB: integration_db
    ports:
      - "5440:5432"
    volumes:
      - pgdata_integration:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integration_user -d integration_db"]
      interval: 5s
      timeout: 5s
      retries: 5

        # SERVICES
  # ─── Auth Service ───────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@db_auth:5432/auth_db
    depends_on:
      db_auth:
        condition: service_healthy
    networks:
      - meeting_network

  # ─── AI Service ─────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://ai_user:ai_pass@db_ai:5432/ai_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      db_ai:
        condition: service_healthy
    networks:
      - meeting_network

  # ─── Company Service ────────────────────────
  company-service:
    build:
      context: ./services/company-service
      dockerfile: Dockerfile
    container_name: company-service
    ports:
      - "8003:8003"
    env_file:
      - ./services/company-service/.env
    environment:
      COMPANY_DATABASE_URL: postgresql+asyncpg://company_user:company_pass@db_company:5432/company_db
    depends_on:
      db_company:
        condition: service_healthy
    networks:
      - meeting_network
    volumes:
      - ./services/company-service:/app

  # ─── Transcription Service ──────────────────
  transcription-service:
    build:
      context: ./services/transcription-service
      dockerfile: Dockerfile
    container_name: transcription-service
    ports:
      - "8004:8004"
    env_file:
      - ./services/transcription-service/.env
    environment:
      TRANSCRIPTION_DATABASE_URL: postgresql+asyncpg://trans_user:trans_pass@db_transcription:5432/transcription_db
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      MEETING_SERVICE_URL: http://meeting-service:8005/api/v1
      COMPANY_SERVICE_URL: http://company-service:8003/api/v1
      SPEAKER_SIMILARITY_THRESHOLD: "0.5"
      REDIS_URL: redis://redis:6379 
    depends_on:
      db_transcription:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meeting_network

  # ─── Meeting Service ────────────────────────
  meeting-service:
    build:
      context: ./services/meeting-service
      dockerfile: Dockerfile
    container_name: meeting-service
    ports:
      - "8005:8005"
    env_file:
      - ./services/meeting-service/.env
    environment:
      MEETING_DATABASE_URL: postgresql+asyncpg://meeting_user:meeting_pass@db_meeting:5432/meeting_db
      REDIS_URL: redis://redis:6379
    depends_on:
      db_meeting:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meeting_network

  # ─── AI Analysis Service ────────────────────
  ai-analysis-service:
    build:
      context: ./services/ai-analysis-service
      dockerfile: Dockerfile
    container_name: ai-analysis-service
    env_file:
      - ./services/ai-analysis-service/.env 
    ports:
      - "8006:8006"
    environment:
      AI_ANALYSIS_DATABASE_URL: postgresql+asyncpg://ai_analysis_user:ai_analysis_pass@db_ai_analysis:5432/ai_analysis_db
      REDIS_URL: redis://redis:6379
      TRANSCRIPTION_SERVICE_URL: http://transcription-service:8004
      COMPANY_SERVICE_URL: http://company-service:8003
      MEETING_SERVICE_URL: http://meeting-service:8005
    depends_on:
      db_ai_analysis:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meeting_network

 # ─── Integration Service ────────────────────
  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    container_name: integration-service
    ports:
      - "8007:8007"
    environment:
      INTEGRATION_DATABASE_URL: postgresql+asyncpg://integration_user:integration_pass@db_integration:5432/integration_db
      REDIS_URL: redis://redis:6379
      COMPANY_SERVICE_URL: http://company-service:8003/api/v1
    depends_on:
      db_integration:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meeting_network

  # ─── API Gateway ────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - ai-service
      - company-service
      - transcription-service
      - meeting-service
    env_file:
      - ./services/api-gateway/.env
    networks:
      - meeting_network

  # ─── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  pgdata_auth:
  pgdata_ai:
  pgdata_meeting:
  pgdata_company:
  pgdata_transcription:
  pgdata_ai_analysis:
  pgdata_integration:

networks:
  meeting_network:
    driver: bridge
