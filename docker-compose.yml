services:
  # ─── Auth DB ───────────────────────────────
  db_auth:
    image: postgres:15
    container_name: db_auth
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - meeting_network

  # ─── AI DB ─────────────────────────────────
  db_ai:
    image: postgres:15
    container_name: db_ai
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_pass
      POSTGRES_DB: ai_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_ai:/var/lib/postgresql/data
    networks:
      - meeting_network

  # ─── Auth Service ───────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@db_auth:5432/auth_db
    depends_on:
      - db_auth
    networks:
      - meeting_network

  # ─── AI Service ─────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://ai_user:ai_pass@db_ai:5432/ai_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db_ai
    networks:
      - meeting_network

  # ─── API Gateway ────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - ai-service
    networks:
      - meeting_network

  # ─── Company DB ─────────────────────────────
  db_company:
    image: pgvector/pgvector:pg15
    container_name: db_company
    environment:
      POSTGRES_USER: company_user
      POSTGRES_PASSWORD: company_pass
      POSTGRES_DB: company_db
    ports:
      - "5436:5432"
    volumes:
      - pgdata_company:/var/lib/postgresql/data
    networks:
      - meeting_network

  # ─── Company Service ────────────────────────
  company-service:
    build:
      context: ./services/company-service
      dockerfile: Dockerfile
    container_name: company-service
    ports:
      - "8003:8003"
    environment:
      COMPANY_DATABASE_URL: postgresql+asyncpg://company_user:company_pass@db_company:5432/company_db
    depends_on:
      - db_company
    networks:
      - meeting_network
    volumes:
      - ./services/company-service:/app

  # ─── Transcription DB ───────────────────────
  db_transcription:
    image: postgres:15
    container_name: db_transcription
    environment:
      POSTGRES_USER: trans_user
      POSTGRES_PASSWORD: trans_pass
      POSTGRES_DB: transcription_db
    ports:
      - "5437:5432"
    volumes:
      - pgdata_transcription:/var/lib/postgresql/data
    networks:
      - meeting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trans_user -d transcription_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Transcription Service ──────────────────
  transcription-service:
    build:
      context: ./services/transcription-service
      dockerfile: Dockerfile
    container_name: transcription-service
    ports:
      - "8004:8004"
    environment:
      TRANSCRIPTION_DATABASE_URL: postgresql+asyncpg://trans_user:trans_pass@db_transcription:5432/transcription_db
    depends_on:
      db_transcription:
        condition: service_healthy
    networks:
      - meeting_network

volumes:
  pgdata_auth:
  pgdata_ai:
  pgdata_company:
  pgdata_transcription:    # ← thêm dòng này

networks:
  meeting_network:
    driver: bridge